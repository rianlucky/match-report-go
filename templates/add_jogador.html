{% extends "base.html" %}
{% block title %}Novo Jogador - MRG{% endblock %}
{% block content %}
<section class="page-title-row">
    <div>
        <p>{{ team_name }}</p>
        <h1>Novo Jogador</h1>
        <span>As informacoes salvas entram no plantel e na proxima sumula.</span>
    </div>
    <a class="btn-secondary" href="{{ url_for('plantel') }}">Voltar</a>
</section>

<section class="panel form-panel">
    <form method="POST" class="form-grid">
        <label>Nome completo<input type="text" name="nome_completo" required></label>
        <label>Apelido<input type="text" name="apelido"></label>
        <label>Idade<input type="number" name="idade" min="15" max="100"></label>
        <label>Numero<input type="number" name="numero" min="1" max="99"></label>
        <label>Posicao
            <select name="posicao" required>
                <option value="">Selecione</option>
                <option>Goleiro</option>
                <option>Fixo</option>
                <option>Ala Direita</option>
                <option>Ala Esquerda</option>
                <option>Pivo</option>
            </select>
        </label>
        <label>Data de entrada<input type="date" name="data_entrada" required></label>
        <div class="form-actions">
            <button class="btn-primary" type="submit">Salvar jogador</button>
        </div>
    </form>
</section>
{% endblock %}
