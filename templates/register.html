<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Time - MRG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mrg.css') }}">
</head>
<body class="auth-body">
    <section class="auth-panel">
        <img src="{{ url_for('static', filename='images/MRG_Logo.png') }}" alt="MRG" class="auth-logo">
        <h1>Cadastrar time</h1>
        <p>Crie uma conta para separar plantel, sumulas, historico e dashboard do seu time.</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}<div class="flash">{{ message }}</div>{% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" class="form-stack">
            <label>Nome do time<input name="nome_time" type="text" required></label>
            <label>Usuario<input name="username" type="text" required autocomplete="username"></label>
            <label>Senha<input name="password" type="password" required autocomplete="new-password"></label>
            <label>Confirmar senha<input name="confirm_password" type="password" required autocomplete="new-password"></label>
            <button class="btn-primary" type="submit">Criar conta</button>
        </form>
        <a class="auth-link" href="{{ url_for('login') }}">Ja tenho uma conta</a>
    </section>
    <script src="{{ url_for('static', filename='js/accessibility.js') }}"></script>
</body>
</html>
