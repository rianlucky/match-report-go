<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - MRG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mrg.css') }}">
</head>
<body class="auth-body">
    <section class="auth-panel">
        <img src="{{ url_for('static', filename='images/MRG_Logo.png') }}" alt="MRG" class="auth-logo">
        <h1>Entrar no MRG</h1>
        <p>Acesse a conta do seu time para registrar partidas e acompanhar estatisticas.</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}<div class="flash">{{ message }}</div>{% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" class="form-stack">
            <label>Usuario<input name="username" type="text" required autocomplete="username"></label>
            <label>Senha<input name="password" type="password" required autocomplete="current-password"></label>
            <button class="btn-primary" type="submit">Entrar</button>
        </form>
        <a class="auth-link" href="{{ url_for('register') }}">Cadastrar meu time</a>
    </section>
</body>
</html>
